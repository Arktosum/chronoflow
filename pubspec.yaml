name: chronoflow
description: A frictionless thought and entity tracking journal.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management & Routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0
  
  # Database (Isar)
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.1.2 # Required for Isar to find local storage
  
  # UI & Utilities
  flutter_heatmap_calendar: ^1.0.5
  intl: ^0.19.0 # Date formatting
  lucide_icons: 0.257.0 # Clean, modern icons
  uuid: ^4.3.3 # For unique tag generation if needed

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code Generation for Isar
  build_runner: ^2.4.8
  isar_generator: ^3.1.0