org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Kotlin incremental compilation breaks on Windows when the pub cache (C:)
# and the project (G:) live on different drives — path relativization fails
# while closing the caches. Non-incremental plugin builds are the fix.
kotlin.incremental=false
